[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn pond.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
healthcheckPath = "/healthz/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[deploy.envVars]]
name = "DJANGO_SETTINGS_MODULE"
value = "pond.settings.production"

[[deploy.envVars]]
name = "ALLOWED_HOSTS"
value = "healthcheck.railway.app,.railway.app,localhost,127.0.0.1"
