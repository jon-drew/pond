[build]
builder = "nixpacks"

[deploy]
startCommand = "DJANGO_SETTINGS_MODULE=pond.settings.production python manage.py migrate --noinput && DJANGO_SETTINGS_MODULE=pond.settings.production python manage.py collectstatic --noinput && gunicorn pond.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60"
healthcheckPath = "/healthz/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

